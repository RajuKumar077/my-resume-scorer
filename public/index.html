<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ATS Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-10 font-sans">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                AI Resume Scorer Pro
            </h1>
            <p class="text-slate-400 mt-2">One-by-One Module Testing: Core Analyzer</p>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
                    <label class="block text-sm font-medium text-slate-400 mb-2">Job Description</label>
                    <textarea id="jd" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 h-40 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Paste requirements here..."></textarea>
                    
                    <label class="block text-sm font-medium text-slate-400 mt-4 mb-2">Upload Resume (PDF/DOCX)</label>
                    <input type="file" id="resume" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-500 cursor-pointer">
                    
                    <button onclick="analyze()" id="btn" class="w-full mt-6 bg-gradient-to-r from-blue-600 to-blue-500 py-3 rounded-xl font-bold shadow-lg hover:shadow-blue-500/20 transition-all">
                        RUN ANALYSIS
                    </button>
                </div>
            </div>

            <div id="results" class="lg:col-span-2 hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 text-center">
                        <h2 class="text-6xl font-black text-blue-400" id="score-text">0%</h2>
                        <p class="text-slate-400 mt-2 uppercase tracking-widest text-xs">Match Score</p>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                        <h3 class="text-red-400 font-bold mb-3 flex items-center">
                            <span class="mr-2">⚠️</span> Missing Keywords
                        </h3>
                        <ul id="keywords" class="space-y-1 text-sm text-slate-300"></ul>
                    </div>
                </div>

                <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                    <h3 class="text-slate-200 font-bold mb-4">Skills Gap Analysis</h3>
                    <div class="h-64">
                        <canvas id="skillChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let myChart = null;

        async function analyze() {
            const btn = document.getElementById('btn');
            const resumeFile = document.getElementById('resume').files[0];
            const jdValue = document.getElementById('jd').value;

            if(!resumeFile || !jdValue) return alert("Please provide both Resume and JD");

            btn.innerText = "Analyzing...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('resume', resumeFile);
            formData.append('jd', jdValue);

            try {
                const res = await fetch('http://127.0.0.1:8000/api/analyze', { method: 'POST', body: formData });
                const data = await res.json();

                document.getElementById('results').classList.remove('hidden');
                document.getElementById('score-text').innerText = data.score + "%";
                
                const kwList = document.getElementById('keywords');
                kwList.innerHTML = data.missing_keywords.map(kw => `<li class="bg-slate-700/50 px-3 py-1 rounded-md inline-block mr-2 mb-2 text-xs">${kw}</li>`).join('');

                const ctx = document.getElementById('skillChart').getContext('2d');
                if(myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: Object.keys(data.skills_gap),
                        datasets: [{
                            label: 'Competency Level',
                            data: Object.values(data.skills_gap),
                            backgroundColor: 'rgba(59, 130, 246, 0.2)',
                            borderColor: '#3b82f6',
                            borderWidth: 2,
                            pointBackgroundColor: '#3b82f6'
                        }]
                    },
                    options: { 
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { r: { grid: { color: '#334155' }, angleLines: { color: '#334155' }, ticks: { display: false }, pointLabels: { color: '#94a3b8' } } },
                        plugins: { legend: { display: false } }
                    }
                });
            } catch (err) {
                alert("Server error. Check terminal.");
            } finally {
                btn.innerText = "RUN ANALYSIS";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
